<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dali rooms | Admin Dashboard</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x2699;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0a1628;
            --navy-light: #12213d;
            --navy-mid: #1a2d52;
            --accent: #d4af37;
            --accent-dim: rgba(212, 175, 55, 0.15);
            --accent-glow: rgba(212, 175, 55, 0.3);
            --teal: #00a8b5;
            --teal-dim: rgba(0, 168, 181, 0.12);
            --surface: #0f1d35;
            --surface-raised: #162544;
            --border: rgba(212, 175, 55, 0.12);
            --border-hover: rgba(212, 175, 55, 0.3);
            --text: #e8e6e1;
            --text-muted: #8a9bb5;
            --text-dim: #5a6a82;
            --success: #34d399;
            --error: #f87171;
            --font-body: 'DM Sans', sans-serif;
            --font-heading: 'Playfair Display', serif;
            --radius: 10px;
            --radius-lg: 16px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--navy);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- LOGIN SCREEN ---- */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--navy) 0%, #091220 50%, var(--navy-light) 100%);
            position: relative;
            overflow: hidden;
        }

        .login-screen::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, var(--accent-dim) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, var(--teal-dim) 0%, transparent 50%);
            animation: loginBgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes loginBgPulse {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-2%, 2%) scale(1.05); }
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            margin: 1rem;
            padding: 3rem 2.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-brand h1 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .login-brand p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--navy);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .form-input::placeholder {
            color: var(--text-dim);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, #c9a42f 100%);
            color: var(--navy);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .login-btn:active { transform: translateY(0); }

        .login-error {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: var(--radius);
            color: var(--error);
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        /* ---- DASHBOARD ---- */
        .dashboard { display: none; min-height: 100vh; }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .topbar-brand h2 {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: 600;
        }

        .topbar-brand span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            padding: 0.2rem 0.6rem;
            background: var(--accent-dim);
            border-radius: 4px;
            font-weight: 600;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-icon {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--navy);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-icon:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .main-content {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .section-header i {
            font-size: 1rem;
            color: var(--accent);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-dim);
            border-radius: 8px;
        }

        .section-header h3 {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 600;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .field-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 1rem;
            align-items: start;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .field-row:last-child { border-bottom: none; }

        .field-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding-top: 0.65rem;
        }

        .field-input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: var(--navy);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .field-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-dim);
        }

        textarea.field-input {
            min-height: 80px;
            resize: vertical;
            line-height: 1.5;
        }

        /* Language tabs */
        .lang-tabs {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 1.25rem;
            background: var(--navy);
            border-radius: var(--radius);
            padding: 4px;
            border: 1px solid var(--border);
        }

        .lang-tab {
            flex: 1;
            padding: 0.6rem 1rem;
            background: transparent;
            border: none;
            border-radius: 7px;
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lang-tab.active {
            background: var(--accent);
            color: var(--navy);
        }

        .lang-tab:hover:not(.active) {
            color: var(--text);
            background: var(--surface-raised);
        }

        .lang-panel { display: none; }
        .lang-panel.active { display: block; }

        .trans-group {
            margin-bottom: 1.5rem;
        }

        .trans-group-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--accent-dim);
        }

        .trans-row {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 0.75rem;
            align-items: start;
            padding: 0.5rem 0;
        }

        .trans-key {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: 'Courier New', monospace;
            padding-top: 0.55rem;
            word-break: break-all;
        }

        .trans-input {
            width: 100%;
            padding: 0.55rem 0.75rem;
            background: var(--navy);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .trans-input:focus {
            border-color: var(--teal);
        }

        /* Save bar */
        .save-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 1rem;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .save-bar.visible { transform: translateY(0); }

        .save-status {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-right: auto;
        }

        .save-status.success { color: var(--success); }
        .save-status.error { color: var(--error); }

        .btn-save {
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, var(--accent), #c9a42f);
            color: var(--navy);
            border: none;
            border-radius: var(--radius);
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-discard {
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-discard:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 22, 40, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .loading-overlay.hidden { display: none; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            font-size: 0.88rem;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 380px;
        }

        .toast.show { transform: translateX(0); }

        .toast.success {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--success);
        }

        .toast.error {
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--error);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .topbar { padding: 0.75rem 1rem; }
            .main-content { padding: 1.25rem 1rem 5rem; }
            .card { padding: 1.25rem; }
            .field-row { grid-template-columns: 1fr; gap: 0.4rem; }
            .trans-row { grid-template-columns: 1fr; gap: 0.3rem; }
            .topbar-brand span { display: none; }
            .save-bar { padding: 0.75rem 1rem; }
        }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="login-brand">
            <h1>Dali rooms</h1>
            <p>Admin Dashboard</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
            <div class="login-error" id="loginError">Invalid credentials. Please try again.</div>
        </form>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="topbar">
        <div class="topbar-brand">
            <h2>Dali rooms</h2>
            <span>Admin</span>
        </div>
        <div class="topbar-actions">
            <a href="/" class="btn-icon" title="View Site"><i class="fas fa-external-link-alt"></i></a>
            <button class="btn-icon" id="logoutBtn" title="Sign Out"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <div class="main-content">

        <!-- GENERAL SETTINGS -->
        <div class="section-header">
            <i class="fas fa-cog"></i>
            <h3>General Settings</h3>
        </div>
        <div class="card" id="settingsCard">
            <div class="field-row">
                <div class="field-label">WhatsApp Number</div>
                <div>
                    <input type="text" class="field-input" id="set_whatsapp_number" placeholder="306974819837" data-setting="whatsapp_number">
                    <div style="font-size:0.72rem;color:var(--text-dim);margin-top:0.35rem;">Digits only, with country code (e.g. 306974819837)</div>
                </div>
            </div>
            <div class="field-row">
                <div class="field-label">Display Number</div>
                <div>
                    <input type="text" class="field-input" id="set_whatsapp_display" placeholder="+30 697 481 9837" data-setting="whatsapp_display">
                    <div style="font-size:0.72rem;color:var(--text-dim);margin-top:0.35rem;">Human-readable format shown on the website</div>
                </div>
            </div>
            <div class="field-row">
                <div class="field-label">Base Room Price</div>
                <div style="display:flex;gap:0.5rem;align-items:center;">
                    <input type="number" class="field-input" id="set_room_price_base" placeholder="250" style="max-width:140px;" data-setting="room_price_base">
                    <span style="color:var(--text-muted);font-size:0.85rem;">/night</span>
                </div>
            </div>
            <div class="field-row">
                <div class="field-label">Price Currency</div>
                <div>
                    <select class="field-input" id="set_room_price_currency" data-setting="room_price_currency" style="max-width:180px;">
                        <option value="EUR">EUR (&euro;)</option>
                        <option value="USD">USD ($)</option>
                        <option value="GBP">GBP (&pound;)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- TRANSLATIONS -->
        <div class="section-header">
            <i class="fas fa-language"></i>
            <h3>Translations</h3>
        </div>
        <div class="card">
            <div class="lang-tabs">
                <button class="lang-tab active" data-lang="en"><i class="fas fa-flag-usa" style="margin-right:6px;"></i> English</button>
                <button class="lang-tab" data-lang="de"><i class="fas fa-flag" style="margin-right:6px;"></i> Deutsch</button>
                <button class="lang-tab" data-lang="zh"><i class="fas fa-globe-asia" style="margin-right:6px;"></i> 中文</button>
            </div>
            <div id="translationPanels"></div>
        </div>

    </div>
</div>

<!-- SAVE BAR -->
<div class="save-bar" id="saveBar">
    <div class="save-status" id="saveStatus">Unsaved changes</div>
    <button class="btn-discard" id="discardBtn">Discard</button>
    <button class="btn-save" id="saveBtn">Save Changes</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LOADING -->
<div class="loading-overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<script>
(function() {
    let authHeader = '';
    let originalData = null;
    let hasChanges = false;

    const TRANSLATION_GROUPS = {
        'Navigation': ['nav_home', 'nav_about', 'nav_rooms', 'nav_amenities', 'nav_gallery', 'nav_location', 'nav_book_now'],
        'Hero Section': ['hero_title', 'hero_subtitle', 'hero_cta'],
        'About Section': ['about_title', 'about_subtitle', 'about_p1', 'about_p2'],
        'Rooms': ['rooms_title', 'rooms_subtitle', 'room_tag_premium', 'room_tag_exclusive', 'room_tag_signature', 'room1_title', 'room1_desc', 'room2_title', 'room2_desc', 'room3_title', 'room3_desc', 'room_book'],
        'Amenities': ['amenities_title', 'amenities_subtitle', 'amenity1_title', 'amenity1_desc', 'amenity2_title', 'amenity2_desc', 'amenity3_title', 'amenity3_desc'],
        'Gallery': ['gallery_title', 'gallery_subtitle', 'gallery_all', 'gallery_rooms', 'gallery_facilities', 'gallery_views'],
        'Contact': ['contact_title', 'contact_desc', 'contact_loc', 'contact_email_header', 'contact_phone_header'],
        'Footer': ['footer_cta_title', 'footer_cta_desc', 'footer_cta_btn', 'footer_brand_desc', 'footer_links_header', 'footer_contact_header', 'footer_copyright', 'footer_privacy', 'footer_terms'],
        'AI Concierge': ['ai_widget_tooltip', 'ai_widget_title', 'ai_welcome']
    };

    const LANGS = ['en', 'de', 'zh'];

    // ---- Auth ----
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        authHeader = 'Basic ' + btoa(user + ':' + pass);

        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Authorization': authHeader }
            });
            if (!res.ok) throw new Error('Invalid credentials');
            sessionStorage.setItem('dali_auth', authHeader);
            showDashboard();
        } catch {
            document.getElementById('loginError').style.display = 'block';
            authHeader = '';
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', function() {
        sessionStorage.removeItem('dali_auth');
        authHeader = '';
        location.reload();
    });

    // Check existing session
    const saved = sessionStorage.getItem('dali_auth');
    if (saved) {
        authHeader = saved;
        showDashboard();
    }

    async function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        await loadData();
    }

    // ---- Data loading ----
    function showLoading(v) {
        document.getElementById('loadingOverlay').classList.toggle('hidden', !v);
    }

    async function loadData() {
        showLoading(true);
        try {
            const [settingsRes, transRes] = await Promise.all([
                fetch('/api/admin/settings', { headers: { 'Authorization': authHeader } }),
                fetch('/api/admin/translations', { headers: { 'Authorization': authHeader } })
            ]);

            if (!settingsRes.ok || !transRes.ok) {
                if (settingsRes.status === 401 || transRes.status === 401) {
                    sessionStorage.removeItem('dali_auth');
                    location.reload();
                    return;
                }
                throw new Error('Failed to load data');
            }

            const settings = await settingsRes.json();
            const translations = await transRes.json();

            originalData = { settings, translations };
            populateSettings(settings);
            populateTranslations(translations);
            hasChanges = false;
            updateSaveBar();
        } catch (err) {
            showToast('Failed to load data. Please reload.', 'error');
        }
        showLoading(false);
    }

    function populateSettings(settings) {
        document.querySelectorAll('[data-setting]').forEach(el => {
            const key = el.getAttribute('data-setting');
            if (settings[key] !== undefined) {
                el.value = settings[key];
            }
        });
    }

    function populateTranslations(translations) {
        const container = document.getElementById('translationPanels');
        container.innerHTML = '';

        LANGS.forEach(lang => {
            const panel = document.createElement('div');
            panel.className = 'lang-panel' + (lang === 'en' ? ' active' : '');
            panel.id = 'panel_' + lang;

            const data = translations[lang] || {};

            for (const [groupName, keys] of Object.entries(TRANSLATION_GROUPS)) {
                const group = document.createElement('div');
                group.className = 'trans-group';

                const title = document.createElement('div');
                title.className = 'trans-group-title';
                title.textContent = groupName;
                group.appendChild(title);

                keys.forEach(key => {
                    const row = document.createElement('div');
                    row.className = 'trans-row';

                    const keyLabel = document.createElement('div');
                    keyLabel.className = 'trans-key';
                    keyLabel.textContent = key;

                    const val = data[key] || '';
                    const isLong = val.length > 80;
                    let input;
                    if (isLong) {
                        input = document.createElement('textarea');
                        input.rows = 3;
                    } else {
                        input = document.createElement('input');
                        input.type = 'text';
                    }
                    input.className = 'trans-input';
                    input.value = val;
                    input.setAttribute('data-trans-lang', lang);
                    input.setAttribute('data-trans-key', key);
                    input.addEventListener('input', markChanged);

                    row.appendChild(keyLabel);
                    row.appendChild(input);
                    group.appendChild(row);
                });

                panel.appendChild(group);
            }
            container.appendChild(panel);
        });
    }

    // ---- Language tabs ----
    document.querySelectorAll('.lang-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            const lang = this.getAttribute('data-lang');
            document.querySelectorAll('.lang-panel').forEach(p => p.classList.remove('active'));
            const panel = document.getElementById('panel_' + lang);
            if (panel) panel.classList.add('active');
        });
    });

    // ---- Change tracking ----
    document.getElementById('settingsCard').addEventListener('input', markChanged);

    function markChanged() {
        hasChanges = true;
        updateSaveBar();
    }

    function updateSaveBar() {
        const bar = document.getElementById('saveBar');
        bar.classList.toggle('visible', hasChanges);
        document.getElementById('saveStatus').textContent = 'Unsaved changes';
        document.getElementById('saveStatus').className = 'save-status';
    }

    // ---- Save ----
    document.getElementById('saveBtn').addEventListener('click', saveAll);
    document.getElementById('discardBtn').addEventListener('click', function() {
        if (originalData) {
            populateSettings(originalData.settings);
            populateTranslations(originalData.translations);
        }
        hasChanges = false;
        updateSaveBar();
    });

    async function saveAll() {
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        try {
            const settings = {};
            document.querySelectorAll('[data-setting]').forEach(el => {
                settings[el.getAttribute('data-setting')] = el.value;
            });

            const translations = {};
            document.querySelectorAll('[data-trans-key]').forEach(el => {
                const lang = el.getAttribute('data-trans-lang');
                const key = el.getAttribute('data-trans-key');
                if (!translations[lang]) translations[lang] = {};
                translations[lang][key] = el.value;
            });

            const [sRes, tRes] = await Promise.all([
                fetch('/api/admin/settings', {
                    method: 'PUT',
                    headers: { 'Authorization': authHeader, 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                }),
                fetch('/api/admin/translations', {
                    method: 'PUT',
                    headers: { 'Authorization': authHeader, 'Content-Type': 'application/json' },
                    body: JSON.stringify(translations)
                })
            ]);

            if (!sRes.ok || !tRes.ok) throw new Error('Save failed');

            originalData = { settings, translations };
            hasChanges = false;
            updateSaveBar();
            showToast('All changes saved successfully.', 'success');
        } catch {
            showToast('Failed to save changes. Please try again.', 'error');
        }

        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
    }

    // ---- Toast ----
    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast ' + type;
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ---- Prevent accidental navigation ----
    window.addEventListener('beforeunload', function(e) {
        if (hasChanges) {
            e.preventDefault();
            e.returnValue = '';
        }
    });
})();
</script>
</body>
</html>
